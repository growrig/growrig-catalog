# yaml-language-server: $schema=https://growrig.dev/schema/catalog/species.json
label: Basil
# `optional: true` stages a grower may include or omit per grow; `default: false`
# keeps one off unless the grower opts in.
stages:
  - { name: germination, lightHours: 18, typicalDays: 5, optional: true, default: false }
  - { name: seedling, lightHours: 18, typicalDays: 14, optional: true }
  - { name: growth, lightHours: 18, typicalDays: 28 }
  - { name: harvest, lightHours: 12, typicalDays: 42 }
cultivarAttributes:
  - { key: daysToMaturity, label: Days to maturity, type: number, unit: days }
careActions:
  - { key: water,   label: Water,   icon: droplet,       fields: [amount, runoff, note],                  quick: true }
  - { key: feed,    label: Feed,    icon: flask-conical, fields: [recipe, amount, ph, ec, runoff, note],  quick: true }
  - { key: inspect, label: Inspect, icon: search,        fields: [note, photos],                          quick: true }
  - { key: prune,   label: Prune / pinch, icon: scissors, fields: [note, photos] }
  - { key: treat,   label: Spray / treat, icon: spray-can, fields: [product, note] }
  - { key: harvest, label: Harvest, icon: sprout,        fields: [note] }
  - { key: custom,  label: Custom,  icon: list-plus,     fields: [note, photos] }
