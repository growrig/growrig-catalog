# yaml-language-server: $schema=https://growrig.dev/schema/catalog/species.json
# Cannabis species definition.
#
# `stages` is the ordered cultivation sequence. Each stage carries its default
# daily light hours (`lightHours`, seeds the photoperiod editor) and a typical
# duration in days (`typicalDays`). `typicalDays` is a rough estimate used to
# project a grow's timeline (an expected finish date, the timeline heatmap's
# length) before the grow has run its course; it is a default a grower can
# outgrow, never a hard limit. Omit it for open-ended stages.
# `cultivarAttributes` declares the species-specific fields a cultivar of this
# species carries; the cultivar form renders them dynamically from this list.
label: Cannabis
# `optional: true` stages a grower may include or omit per grow (propagation and
# post-harvest phases); the rest are always part of the sequence. `default: false`
# keeps an optional stage off unless the grower opts in.
stages:
  - { name: germination, lightHours: 18, typicalDays: 3, optional: true, default: false }
  - { name: seedling, lightHours: 18, typicalDays: 14, optional: true }
  - { name: vegetative, lightHours: 18, typicalDays: 28 }
  - { name: flowering, lightHours: 12, typicalDays: 63 }
  - { name: flush, lightHours: 12, typicalDays: 7, optional: true }
  - { name: drying, lightHours: 0, typicalDays: 10, optional: true }
  - { name: cure, lightHours: 0, typicalDays: 21, optional: true }
cultivarAttributes:
  - { key: genetics, label: Genetics, type: enum, options: [sativa, indica, hybrid] }
  - { key: floweringType, label: Flowering type, type: enum, options: [photoperiod, autoflowering] }
  - { key: seedType, label: Seed type, type: enum, options: [feminized, regular] }
  - { key: thc, label: THC, type: percent }
  - { key: cbd, label: CBD, type: percent }
  - { key: floweringWeeks, label: Flowering time, type: number, unit: weeks }
# `careActions` lists the manual actions a grower can log against this crop's
# plants, and which form fields each shows. Actions and fields define what is
# relevant; exact amounts/doses stay per-grow and per-event.
careActions:
  - { key: water,      label: Water,         icon: droplet,       fields: [amount, runoff, note],                  quick: true }
  - { key: feed,       label: Feed,          icon: flask-conical, fields: [recipe, amount, ph, ec, runoff, note],  quick: true }
  - { key: inspect,    label: Inspect,       icon: search,        fields: [note, photos],                          quick: true }
  - { key: train,      label: Train,         icon: spline,        fields: [trainType, note, photos] }
  - { key: trim,       label: Trim / prune,  icon: scissors,      fields: [note, photos] }
  - { key: transplant, label: Transplant,    icon: shovel,        fields: [potSize, note] }
  - { key: treat,      label: Spray / treat, icon: spray-can,     fields: [product, note] }
  - { key: flush,      label: Flush,         icon: waves,         fields: [amount, runoff, note] }
  - { key: harvest,    label: Harvest,       icon: sprout,        fields: [note] }
  - { key: custom,     label: Custom,        icon: list-plus,     fields: [note, photos] }
